<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeScape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 36px; margin-bottom: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 20px; }
    .close-btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #333;
      background: transparent;
      color: #8b7cf7;
      font-size: 12px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-btn:hover { background: #8b7cf710; border-color: #8b7cf7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon"></div>
    <h1 id="title"></h1>
    <p id="message"></p>
    <button class="close-btn" onclick="window.close()">Close Window</button>
  </div>
  <script>
    const hash = window.location.hash;
    const type = new URLSearchParams(hash.slice(1)).get('type');

    if (type === 'recovery') {
      document.getElementById('icon').textContent = '🔒';
      document.getElementById('title').textContent = 'Password Reset Successfully';
      document.getElementById('message').textContent = 'Your password has been updated. You can close this window and return to NodeScape to sign in with your new password.';
    } else if (type === 'signup') {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = 'Email Confirmed';
      document.getElementById('message').textContent = 'Your email has been verified. You can close this window and return to NodeScape to sign in.';
    } else {
      document.getElementById('icon').textContent = '✨';
      document.getElementById('title').textContent = 'Authenticated';
      document.getElementById('message').textContent = 'You can close this window and return to NodeScape.';
    }
  </script>
</body>
</html>
